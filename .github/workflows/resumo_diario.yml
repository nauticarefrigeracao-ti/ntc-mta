name: Resumo Diario do SAC

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  resumo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Resumo diario de prejuizos (dia anterior) no #sac
        env:
          ML_NEON_URL: ${{ secrets.ML_NEON_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python slack_notify.py --resumo-diario
